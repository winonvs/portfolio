<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <title>피키위키 김치</title>
        <style>
            body{
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
            #canvasWrap {
                position: fixed;
                top: 0;
                left: 0;
                z-index: -1;
                width: 100vw;
                height: 100vh;
            }

            .group_btn{
                display: flex;
                gap: 10vw 10vh;
                flex-wrap: wrap;
                width: calc(50% - 20px);
                height: 100%;
                margin: 0 auto;
            }
            .group_btn a{
                width: 30%;
                height: 50%;
                text-align: center;
                text-decoration: none;
                color: #fff;
            }
        </style>
        <script src="./js/model_05.js" type="module" defer></script>
    </head>
    <body>
        <div id="canvasWrap"></div>
        <div class="group_btn">
            <a href="https://www.naver.com/">오징어 친구 1</a>
            <a href="https://www.naver.com/">오징어 친구 2</a>
            <a href="https://www.naver.com/">오징어 친구 3</a>
            <a href="https://www.naver.com/">오징어 친구 4</a>
        </div>
    </body>
</html>
